<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>PolicyBot Admin — Login</title>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
<link rel="stylesheet" href="/static/css/main.css">
<style>
body{display:flex;align-items:center;justify-content:center;min-height:100vh;overflow:auto;}
.login-card{background:var(--bg3);border:1px solid var(--border);border-radius:20px;padding:40px 36px;width:100%;max-width:420px;box-shadow:var(--sh);position:relative;z-index:10;}
.login-logo{display:flex;align-items:center;gap:12px;margin-bottom:28px;}
.login-logo-icon{width:48px;height:48px;border-radius:14px;background:linear-gradient(135deg,var(--a1),var(--a2));display:flex;align-items:center;justify-content:center;font-size:22px;color:#fff;}
.login-title{font-size:22px;font-weight:700;color:var(--tx);}
.login-sub{font-size:13px;color:var(--tx3);}
.form-group{margin-bottom:18px;}
.form-label{display:block;font-size:13px;font-weight:500;color:var(--tx2);margin-bottom:6px;}
.form-input{width:100%;padding:12px 14px;background:var(--bgi);border:1px solid var(--border);border-radius:10px;color:var(--tx);font-size:14px;outline:none;transition:all .2s;}
.form-input:focus{border-color:var(--a1);box-shadow:0 0 0 3px rgba(90,114,255,.12);}
.login-btn{width:100%;padding:13px;background:linear-gradient(135deg,var(--a1),var(--a2));color:#fff;border:none;border-radius:10px;font-size:15px;font-weight:600;cursor:pointer;transition:all .2s;}
.login-btn:hover{opacity:.88;transform:translateY(-1px);}
.error-msg{background:rgba(239,68,68,.1);color:#ef4444;padding:10px 14px;border-radius:8px;font-size:13px;margin-bottom:16px;}
.back-link{display:block;text-align:center;margin-top:16px;font-size:13px;color:var(--tx3);text-decoration:none;}
.back-link:hover{color:var(--a1);}
</style>
</head>
<body class="theme-neon">
<div class="bg-grid"></div><div class="bg-orb orb-1"></div>
<div class="login-card">
  <div class="login-logo">
    <div class="login-logo-icon"><i class="fas fa-shield-halved"></i></div>
    <div><div class="login-title">Admin Login</div><div class="login-sub">PolicyBot v3 Control Panel</div></div>
  </div>
  {% if error %}<div class="error-msg"><i class="fas fa-circle-exclamation"></i> {{ error }}</div>{% endif %}
  <form method="POST">
    <div class="form-group">
      <label class="form-label">Admin ID</label>
      <input class="form-input" type="text" name="admin_id" placeholder="Enter admin ID" required autofocus>
    </div>
    <div class="form-group">
      <label class="form-label">Password</label>
      <input class="form-input" type="password" name="password" placeholder="Enter password" required>
    </div>
    <button class="login-btn" type="submit"><i class="fas fa-lock-open"></i> Sign In</button>
  </form>
  <a class="back-link" href="/"><i class="fas fa-arrow-left"></i> Back to Chat</a>
</div>
</body></html>
